async function loadSaves() {
  if (!supabase) return [];
  const { data, error } = await supabase.from('saved_states').select('id, name, updated_at').order('updated_at', { ascending: false });
  return error ? [] : data;
}
async function loadState(id) {
  if (!supabase) return null;
  const { data, error } = await supabase.from('saved_states').select('state').eq('id', id).single();
  return error ? null : data.state;
}
async function saveState(name, state, existingId) {
  if (!supabase) return null;
  if (existingId) {
    const { data, error } = await supabase.from('saved_states').update({ state, updated_at: new Date().toISOString() }).eq('id', existingId).select().single();
    return error ? null : data;
  }
  const { data, error } = await supabase.from('saved_states').insert({ name, state }).select().single();
  return error ? null : data;
}
async function deleteSave(id) {
  if (!supabase) return false;
  const { error } = await supabase.from('saved_states').delete().eq('id', id);
  return !error;
}

const fmt = (n) => {
  if (n == null || isNaN(n)) return '$0';
  const abs = Math.abs(Math.round(n));
  const f = abs.toLocaleString('en-US');
  return n < 0 ? '-$' + f : '$' + f;
};
const pct = (n) => {
  if (n == null || isNaN(n)) return '0.0%';
  return (n * 100).toFixed(1) + '%';
};

function SliderField({ label, value, min, max, step, onChange, prefix, note, unit }) {
  const [lv, setLv] = useState(String(value));
  useEffect(() => { setLv(String(value)); }, [value]);
  const display = prefix === '$' ? fmt(value) : unit ? value + unit : value;
  return (
    <div style={{ marginBottom: 14 }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:4 }}>
        <label style={{ fontSize:13, fontWeight:600, color:GRAY700 }}>{label}</label>
        <span style={{ fontSize:16, fontWeight:700, color:GRAY900 }}>{display}</span>
      </div>
      <div style={{ display:'flex', gap:8, alignItems:'center' }}>
        <input type="range" min={min} max={max} step={step||1} value={value}
          onChange={e => onChange(Number(e.target.value))} style={{ flex:1 }} />
        <input type="number" value={lv} onChange={e => setLv(e.target.value)}
          onBlur={() => { let v=Number(lv); if(isNaN(v))v=min; v=Math.max(min,Math.min(max,v)); setLv(String(v)); onChange(v); }}
          style={{ width:80, padding:'4px 8px', border:'1px solid '+GRAY200, borderRadius:6, fontSize:13, textAlign:'right' }} />
      </div>
      {note && <div style={{ fontSize:11, color:GRAY500, fontStyle:'italic', marginTop:2 }}>{note}</div>}
    </div>
  );
}

const TABS = ['Scenarios','Overview','Partners & Growth','Costs','Sensitivity','Forecast'];

// ═══ MAIN APP ═══
function App() {
  const [state, setState] = useState({ ...defaults });
  const [activeTab, setActiveTab] = useState('Scenarios');
  const [scenarioMode, setScenarioMode] = useState('pilot');
  const [editTierFees, setEditTierFees] = useState(false);
  const [bothWorldsLens, setBothWorldsLens] = useState(false);
  const [sensitivityOverlay, setSensitivityOverlay] = useState('None');
  const [sensitivityLens, setSensitivityLens] = useState(false);
  const [saves, setSaves] = useState([]);
  const [currentSaveId, setCurrentSaveId] = useState(null);
  const [currentSaveName, setCurrentSaveName] = useState('');
  const [saveStatus, setSaveStatus] = useState('');
  const [showSaveDialog, setShowSaveDialog] = useState(false);
  const [newSaveName, setNewSaveName] = useState('');
  const [loaded, setLoaded] = useState(false);

  // Auto-load: on mount, look for autosave slot and restore it
  useEffect(() => {
    (async () => {
      const allSaves = await loadSaves();
      setSaves(allSaves);
      const autosave = allSaves.find(s => s.name === '__autosave__');
      if (autosave) {
        const data = await loadState(autosave.id);
        if (data) {
          setState({ ...defaults, ...data });
          setCurrentSaveId(autosave.id);
          setCurrentSaveName('');
        }
      }
      setLoaded(true);
    })();
  }, []);

  // Auto-save debounce: always save to autosave slot 2s after any change
  const saveTimerRef = React.useRef(null);
  const loadedRef = React.useRef(false);
  useEffect(() => { loadedRef.current = loaded; }, [loaded]);
  useEffect(() => {
    if (!loadedRef.current) return;
    if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
    saveTimerRef.current = setTimeout(async () => {
      // Upsert autosave slot
      if (currentSaveId) {
        await saveState(null, state, currentSaveId);
      } else {
        // Check if autosave exists
        const allSaves = await loadSaves();
        const autosave = allSaves.find(s => s.name === '__autosave__');
        if (autosave) {
          await saveState(null, state, autosave.id);
          setCurrentSaveId(autosave.id);
        } else {
          const result = await saveState('__autosave__', state, null);
          if (result) setCurrentSaveId(result.id);
        }
      }
      setSaveStatus('Saved');
      setTimeout(() => setSaveStatus(''), 1500);
    }, 2000);
    return () => { if (saveTimerRef.current) clearTimeout(saveTimerRef.current); };
  }, [state]);

  // Also save to named snapshot if one is active
  const namedSaveTimerRef = React.useRef(null);
  const [activeSaveId, setActiveSaveId] = useState(null);
  const [activeSaveName, setActiveSaveName] = useState('');
  useEffect(() => {
    if (!loadedRef.current || !activeSaveId) return;
    if (namedSaveTimerRef.current) clearTimeout(namedSaveTimerRef.current);
    namedSaveTimerRef.current = setTimeout(async () => {
      await saveState(null, state, activeSaveId);
    }, 2500);
    return () => { if (namedSaveTimerRef.current) clearTimeout(namedSaveTimerRef.current); };
  }, [state, activeSaveId]);

  const handleSaveNew = async () => {
    const name = newSaveName.trim() || ('Save ' + new Date().toLocaleDateString());
    const result = await saveState(name, state, null);
    if (result) {
      setActiveSaveId(result.id);
      setActiveSaveName(name);
      setSaveStatus('Saved!');
      setTimeout(() => setSaveStatus(''), 2000);
      setSaves(await loadSaves());
    }
    setShowSaveDialog(false);
    setNewSaveName('');
  };

  const handleLoad = async (id) => {
    const loadedData = await loadState(id);
    if (loadedData) {
      setState({ ...defaults, ...loadedData });
      const s = saves.find(s => s.id === id);
      if (s && s.name !== '__autosave__') {
        setActiveSaveId(id);
        setActiveSaveName(s.name);
      }
      setSaveStatus('Loaded');
      setTimeout(() => setSaveStatus(''), 2000);
    }
  };

  const handleDelete = async (id) => {
    if (await deleteSave(id)) {
      if (activeSaveId === id) { setActiveSaveId(null); setActiveSaveName(''); }
      setSaves(await loadSaves());
    }
  };

  const set = useCallback((key, val) => setState(prev => ({ ...prev, [key]: val })), []);
  const setPartnerCount = useCallback((idx, val) => setState(prev => {
    const next = [...prev.partnerCounts]; next[idx] = val; return { ...prev, partnerCounts: next };
  }), []);
  const setTierFee = useCallback((idx, val) => setState(prev => {
    const next = [...prev.tierFees]; next[idx] = val; return { ...prev, tierFees: next };
  }), []);
  const resetFees = useCallback(() => { setState(prev => ({ ...prev, tierFees: TIERS.map(t => t.fee) })); setEditTierFees(false); }, []);

  const calc = useMemo(() => {
    const s = state;
    const ct = s.customTiers || [];
    const fixedTotal = s.costStaff + s.costLMS + s.costAccreditation + s.costSystems;
    const totalPartners = s.partnerCounts.reduce((a, b) => a + b, 0) + ct.reduce((a, t) => a + (t.count || 0), 0);
    const totalInstructors = s.partnerCounts.reduce((sum, c, i) => sum + c * TIERS[i].instructors, 0) + ct.reduce((sum, t) => sum + (t.count || 0) * (t.instructors || 0), 0);
    const licenseRevenue = s.partnerCounts.reduce((sum, c, i) => sum + c * s.tierFees[i], 0) + ct.reduce((sum, t) => sum + (t.count || 0) * (t.fee || 0), 0);
    const effectivePartners = totalPartners * (s.renewalRate / 100) * (1 - s.dormantRate / 100);
    const newLicensedOrgs = s.newIPPInstructors * (s.pctIPPtoLicense / 100);
    const activeCohortOrgs = effectivePartners * (s.pctLicenseToActive / 100);
    const totalCohorts = activeCohortOrgs * s.cohortsPerOrg;
    const totalParticipants = totalCohorts * s.avgParticipants;
    const certsIncluded = totalPartners * 15;
    const certsIssued = totalParticipants;
    const certOverages = Math.max(0, certsIssued - certsIncluded);
    const ippRevenue = s.newIPPInstructors * s.feeIPP;
    const cohortRevenue = totalCohorts * s.feeCohort;
    const certOverageRev = certOverages * s.feeCertOverage;
    const grantRevenue = (s.funders || []).reduce((sum, f) => sum + (f.amount || 0), 0);
    const totalRevenue = licenseRevenue + ippRevenue + cohortRevenue + certOverageRev + grantRevenue;
    const ippCostTotal = s.newIPPInstructors * s.costPerIPP;
    const cohortCostTotal = totalCohorts * s.costPerCohort;
    const certCostTotal = certsIssued * s.costPerCert;
    const totalCost = fixedTotal + ippCostTotal + cohortCostTotal + certCostTotal;
    const netMargin = totalRevenue - totalCost;
    const marginPct = totalRevenue > 0 ? netMargin / totalRevenue : -1;
    const recurringRevenue = licenseRevenue + cohortRevenue;
    const stabilityScore = totalRevenue > 0 ? recurringRevenue / totalRevenue : 0;
    const netPerPartner = s.tierFees[0]
      + TIERS[0].instructors * (s.newIPPInstructors / Math.max(totalPartners, 1)) * s.feeIPP
      - s.cohortsPerOrg * (s.pctLicenseToActive / 100) * s.feeCohort
      - s.cohortsPerOrg * (s.pctLicenseToActive / 100) * s.costPerCohort
      - TIERS[0].instructors * (s.newIPPInstructors / Math.max(totalPartners, 1)) * s.costPerIPP;
    const breakEvenPartners = netPerPartner > 0 ? Math.ceil(fixedTotal / netPerPartner) : null;
    const pilotYr1Revenue = (totalPartners - s.pilotPartners) * s.tierFees[0] + s.pilotPartners * s.pilotFee + ippRevenue + cohortRevenue + certOverageRev + grantRevenue;
    const pilotYr1Margin = pilotYr1Revenue - totalCost;
    const pilotYr2Revenue = (totalPartners - s.pilotPartners) * s.tierFees[0] + s.pilotPartners * (s.pilotConvertPct / 100) * s.pilotFullFee + ippRevenue + cohortRevenue + certOverageRev + grantRevenue;
    const pilotYr2Margin = pilotYr2Revenue - totalCost;
    const pilotDrag = totalRevenue - pilotYr1Revenue;
    const consortiumRevenue = s.consortiumFee;
    const consortiumCost = s.consortiumCohorts * s.costPerCohort;
    const consortiumMargin = consortiumRevenue - consortiumCost;
    const equivalentRevenue = s.consortiumPartners * s.tierFees[0];
    const consortiumSaving = (equivalentRevenue - s.consortiumFee) / s.consortiumPartners;
    const sponsoredGap = (s.sponsoredListPrice - s.sponsoredFee) * s.sponsoredPartners;
    const sponsoredCWPMargin = netMargin - sponsoredGap;
    const sponsoredFunderMargin = netMargin;
    return { fixedTotal, totalPartners, totalInstructors, licenseRevenue, effectivePartners,
      newLicensedOrgs, activeCohortOrgs, totalCohorts, totalParticipants, certsIncluded, certsIssued, certOverages,
      ippRevenue, cohortRevenue, certOverageRev, grantRevenue, totalRevenue, ippCostTotal, cohortCostTotal, certCostTotal,
      totalCost, netMargin, marginPct, recurringRevenue, stabilityScore, netPerPartner, breakEvenPartners,
      pilotYr1Revenue, pilotYr1Margin, pilotYr2Revenue, pilotYr2Margin, pilotDrag,
      consortiumRevenue, consortiumCost, consortiumMargin, equivalentRevenue, consortiumSaving,
      sponsoredGap, sponsoredCWPMargin, sponsoredFunderMargin };
  }, [state]);

  const sensitivityData = useMemo(() => {
    const s = state;
    const data = [];
    for (let p = 1; p <= 20; p++) {
      const fixedTotal = s.costStaff + s.costLMS + s.costAccreditation + s.costSystems;
      const grantTotal = (s.funders || []).reduce((sum, f) => sum + (f.amount || 0), 0);
      const licRev = p * s.tierFees[0];
      const effP = p * (s.renewalRate / 100) * (1 - s.dormantRate / 100);
      const actOrgs = effP * (s.pctLicenseToActive / 100);
      const coh = actOrgs * s.cohortsPerOrg;
      const parts = coh * s.avgParticipants;
      const overages = Math.max(0, parts - p * 15);
      const rev = licRev + s.newIPPInstructors * s.feeIPP + coh * s.feeCohort + overages * s.feeCertOverage + grantTotal;
      const cost = fixedTotal + s.newIPPInstructors * s.costPerIPP + coh * s.costPerCohort + parts * s.costPerCert;
      const baseline = rev - cost;
      let scenario = baseline;
      if (sensitivityOverlay === 'Pilot') {
        const pilotRev = (p - s.pilotPartners) * s.tierFees[0] + Math.min(s.pilotPartners, p) * s.pilotFee + s.newIPPInstructors * s.feeIPP + coh * s.feeCohort + overages * s.feeCertOverage + grantTotal;
        scenario = pilotRev - cost;
      } else if (sensitivityOverlay === 'Consortium') {
        const consRev = s.consortiumFee + Math.max(0, p - s.consortiumPartners) * s.tierFees[0] + s.newIPPInstructors * s.feeIPP + coh * s.feeCohort + overages * s.feeCertOverage + grantTotal;
        scenario = consRev - cost;
      } else if (sensitivityOverlay === 'Sponsored') {
        scenario = baseline - (s.sponsoredListPrice - s.sponsoredFee) * Math.min(s.sponsoredPartners, p);
      }
      let lens = null;
      if (sensitivityLens) { lens = licRev + coh * 500 + overages * s.feeCertOverage - cost; }
      const entry = { partners: p, Baseline: baseline };
      if (sensitivityOverlay !== 'None') entry[sensitivityOverlay] = scenario;
      if (sensitivityLens) entry['Membership-Stable'] = lens;
      data.push(entry);
    }
    return data;
  }, [state, sensitivityOverlay, sensitivityLens]);

  // ═══ 5-YEAR FORECAST ENGINE ═══
  const forecast = useMemo(() => {
    const s = state;
    const years = [];
    const startPartners = s.partnerCounts.reduce((a,b) => a+b, 0);
    const ippFees = [s.feeIPP, s.ippFeeYr2, s.ippFeeYr3, s.ippFeeYr4, s.ippFeeYr5];
    let cumRevenue = 0, cumCost = 0, cumMargin = 0;
    let breakEvenYear = null;

    for (let yr = 0; yr < 5; yr++) {
      const feeEsc = Math.pow(1 + s.feeEscalation / 100, yr);
      const cohortFeeEsc = Math.pow(1 + s.cohortFeeEscalation / 100, yr);
      const costInf = Math.pow(1 + s.costInflation / 100, yr);
      const varCostInf = Math.pow(1 + s.variableCostInflation / 100, yr);
      const pipeGrow = Math.pow(1 + s.pipelineGrowth / 100, yr);
      const grantGrow = Math.pow(1 + s.grantGrowthRate / 100, yr);

      // Partner base roll-forward
      let partners;
      if (yr === 0) {
        partners = startPartners;
      } else {
        const prev = years[yr - 1];
        const retained = Math.round(prev.partners * (s.renewalRate / 100));
        const newFromPipeline = Math.round(prev.newIPP * (s.pctIPPtoLicense / 100));
        partners = retained + newFromPipeline;
      }

      const newIPP = Math.round(s.newIPPInstructors * pipeGrow);
      const currentIPPFee = ippFees[yr] || ippFees[ippFees.length - 1];

      // Revenue
      const licRev = s.partnerCounts.reduce((sum, c, i) => {
        const tierShare = startPartners > 0 ? c / startPartners : (i === 0 ? 1 : 0);
        return sum + Math.round(partners * tierShare) * s.tierFees[i] * feeEsc;
      }, 0);
      const ippRev = newIPP * currentIPPFee;
      const effPartners = partners * (s.renewalRate / 100) * (1 - s.dormantRate / 100);
      const actOrgs = effPartners * (s.pctLicenseToActive / 100);
      const cohorts = actOrgs * s.cohortsPerOrg;
      const cohortFee = s.feeCohort * cohortFeeEsc;
      const cohRev = cohorts * cohortFee;
      const participants = cohorts * s.avgParticipants;
      const certsIncl = partners * 15;
      const overages = Math.max(0, participants - certsIncl);
      const certRev = overages * s.feeCertOverage;
      const grantBase = (s.funders || []).reduce((sum, f) => sum + (f.amount || 0), 0);
      const grantRev = grantBase * grantGrow;

      let totalRev = licRev + ippRev + cohRev + certRev + grantRev;

      // Scenario adjustments
      if (s.forecastScenario === 'pilot' && yr < s.pilotDuration) {
        const pilotCount = Math.min(s.pilotPartners, partners);
        const discount = pilotCount * (s.tierFees[0] * feeEsc - s.pilotFee);
        totalRev -= discount;
      } else if (s.forecastScenario === 'pilot' && yr === s.pilotDuration) {
        const converted = Math.round(s.pilotPartners * (s.pilotConvertPct / 100));
        const lost = s.pilotPartners - converted;
        totalRev -= lost * s.tierFees[0] * feeEsc;
      }
      if (s.forecastScenario === 'consortium') {
        const consPartners = Math.min(s.consortiumPartners, partners);
        const indivRev = consPartners * s.tierFees[0] * feeEsc;
        const consRev = s.consortiumFee * feeEsc;
        totalRev -= (indivRev - consRev);
      }
      if (s.forecastScenario === 'sponsored') {
        const gap = (s.sponsoredListPrice - s.sponsoredFee) * s.sponsoredPartners;
        totalRev -= gap;
      }

      // Costs — staff gets its own raise rate, others get general inflation
      const staffInf = Math.pow(1 + s.staffRaiseRate / 100, yr);
      const calendarYear = s.forecastStartYear + yr;
      const isReaccredYear = calendarYear === s.reaccredYear;
      const accredCost = s.costAccreditation * costInf + (isReaccredYear ? s.reaccredCost : 0);
      const fixedTotal = s.costStaff * staffInf + s.costLMS * costInf + accredCost + s.costSystems*costInf;
      const ippCost = newIPP * s.costPerIPP * varCostInf;
      const cohortCost = cohorts * s.costPerCohort * varCostInf;
      const certCost = participants * s.costPerCert * varCostInf;
      const totalCost = fixedTotal + ippCost + cohortCost + certCost;

      const netMargin = totalRev - totalCost;
      cumRevenue += totalRev;
      cumCost += totalCost;
      cumMargin += netMargin;

      if (breakEvenYear === null && cumMargin > 0) breakEvenYear = yr + 1;

      years.push({
        year: yr + 1,
        calendarYear,
        label: calendarYear.toString(),
        partners,
        newIPP,
        licenseRevenue: licRev,
        ippRevenue: ippRev,
        cohortRevenue: cohRev,
        certRevenue: certRev,
        grantRevenue: grantRev,
        totalRevenue: totalRev,
        fixedCost: fixedTotal,
        variableCost: ippCost + cohortCost + certCost,
        reaccredSpike: isReaccredYear ? s.reaccredCost : 0,
        totalCost,
        netMargin,
        marginPct: totalRev > 0 ? netMargin / totalRev : 0,
        cumRevenue,
        cumCost,
        cumMargin,
      });
    }

    return { years, breakEvenYear };
  }, [state]);

  return (
    <div style={{ minHeight:'100vh', background:GRAY100, fontFamily:"'Inter',sans-serif" }}>
      <div style={{ background:'white', borderBottom:'1.5px solid '+GRAY200, padding:'16px 24px' }}>

              Internal planning tool — model pricing, costs, and revenue scenarios
              {activeSaveName && <span style={{ color:BLUE, fontWeight:600 }}> — {activeSaveName}</span>}
              {saveStatus && <span style={{ color:GREEN, marginLeft:8 }}>{saveStatus}</span>}
            </p>
          </div>
          <div style={{ display:'flex', gap:6, alignItems:'center', flexWrap:'wrap' }}>
            {/* Save As (named snapshot) */}
            <button onClick={() => setShowSaveDialog(true)}
              style={{ padding:'6px 12px', fontSize:12, fontWeight:600, borderRadius:6, border:'1px solid '+BLUE, background:BLUE, color:'white', cursor:'pointer', fontFamily:"'Inter',sans-serif" }}>
              Save Snapshot
            </button>
            {/* Load dropdown — only show named saves, not autosave */}
            {saves.filter(s => s.name !== '__autosave__').length > 0 && (
              <select onChange={e => { if (e.target.value) handleLoad(e.target.value); e.target.value = ''; }}
                defaultValue="" style={{ padding:'6px 8px', fontSize:12, border:'1px solid '+GRAY200, borderRadius:6, color:GRAY700, fontFamily:"'Inter',sans-serif" }}>
                <option value="" disabled>Load snapshot...</option>
                {saves.filter(s => s.name !== '__autosave__').map(s => <option key={s.id} value={s.id}>{s.name} — {new Date(s.updated_at).toLocaleDateString()}</option>)}
              </select>
            )}
            {/* Delete active snapshot */}
            {activeSaveId && (
              <button onClick={() => { if (confirm('Delete "'+activeSaveName+'"?')) handleDelete(activeSaveId); }}
                style={{ padding:'6px 10px', fontSize:12, fontWeight:600, borderRadius:6, border:'1px solid '+RED, background:'white', color:RED, cursor:'pointer', fontFamily:"'Inter',sans-serif" }}>
                Delete
              </button>
            )}
            {/* Reset to defaults */}
            <button onClick={() => { setState({...defaults}); setActiveSaveId(null); setActiveSaveName(''); }}
              style={{ padding:'6px 10px', fontSize:12, fontWeight:600, borderRadius:6, border:'1px solid '+GRAY200, background:'white', color:GRAY500, cursor:'pointer', fontFamily:"'Inter',sans-serif" }}>
              Reset
            </button>
          </div>
        </div>
        {/* Save As dialog */}
        {showSaveDialog && (
          <div style={{ marginTop:12, display:'flex', gap:8, alignItems:'center' }}>
            <input type="text" placeholder="Name this save..." value={newSaveName} onChange={e => setNewSaveName(e.target.value)}
              onKeyDown={e => { if (e.key==='Enter') handleSaveNew(); }}
              style={{ flex:1, maxWidth:300, padding:'6px 10px', border:'1px solid '+GRAY200, borderRadius:6, fontSize:13, fontFamily:"'Inter',sans-serif" }}
              autoFocus />
            <button onClick={handleSaveNew}
              style={{ padding:'6px 14px', fontSize:12, fontWeight:600, borderRadius:6, border:'none', background:GREEN, color:'white', cursor:'pointer', fontFamily:"'Inter',sans-serif" }}>
              Save
            </button>
            <button onClick={() => { setShowSaveDialog(false); setNewSaveName(''); }}
              style={{ padding:'6px 10px', fontSize:12, fontWeight:600, borderRadius:6, border:'1px solid '+GRAY200, background:'white', color:GRAY500, cursor:'pointer', fontFamily:"'Inter',sans-serif" }}>
              Cancel
            </button>
          </div>
        )}
      </div>

      <div style={{ display:'flex', gap:12, padding:'16px 24px', flexWrap:'wrap', position:'sticky', top:0, zIndex:10, background:GRAY100 }}>
        <StatCard label="Total Revenue" value={fmt(calc.totalRevenue)} sub={[calc.licenseRevenue,calc.ippRevenue,calc.cohortRevenue,calc.certOverageRev,calc.grantRevenue].filter(v=>v>0).length+' revenue sources'} color={BLUE} />
        <StatCard label="Total Cost" value={fmt(calc.totalCost)} sub={'Fixed '+fmt(calc.fixedTotal)+' + Variable '+fmt(calc.totalCost-calc.fixedTotal)} color={RED} />
        <StatCard label="Net Margin" value={fmt(calc.netMargin)} sub={pct(calc.marginPct)+' margin'} color={calc.netMargin>=0?GREEN:RED} highlight={true} />
        <StatCard label="Break-Even" value={calc.breakEvenPartners!=null?calc.breakEvenPartners+' partners':'N/A'} sub={calc.breakEvenPartners!=null?'1-instructor tier baseline':'N/A \u2014 check pricing'} color={calc.breakEvenPartners!=null?PURPLE:RED} />
        <StatCard label="Stability Score" value={pct(calc.stabilityScore)} sub="recurring / total revenue" color={TEAL} />
      </div>

      <div style={{ display:'flex', gap:0, background:'white', borderBottom:'1.5px solid '+GRAY200, padding:'0 24px', overflowX:'auto' }}>

            padding:'12px 18px', fontSize:13, fontWeight:600, color:activeTab===tab?BLUE:GRAY500,

            cursor:'pointer', whiteSpace:'nowrap', fontFamily:"'Inter',sans-serif" }}>{tab}</button>

      <div style={{ padding:'20px 24px', maxWidth:1200, margin:'0 auto' }}>

        {activeTab==='Overview' && <OverviewTab state={state} calc={calc} bothWorldsLens={bothWorldsLens} setBothWorldsLens={setBothWorldsLens} />}
        {activeTab==='Partners & Growth' && <PartnersGrowthTab state={state} calc={calc} set={set} setPartnerCount={setPartnerCount} setTierFee={setTierFee} editTierFees={editTierFees} setEditTierFees={setEditTierFees} resetFees={resetFees} />}
        {activeTab==='Costs' && <CostsTab state={state} calc={calc} set={set} />}

// ═══ OVERVIEW TAB ═══
function OverviewTab({ state, calc, bothWorldsLens, setBothWorldsLens }) {
  const lensCalc = useMemo(() => {
    if (!bothWorldsLens) return null;
    const s = state;
    const effP = calc.totalPartners * (s.renewalRate / 100) * (1 - s.dormantRate / 100);
    const actOrgs = effP * (s.pctLicenseToActive / 100);
    const coh = actOrgs * s.cohortsPerOrg;
    const parts = coh * s.avgParticipants;
    const overages = Math.max(0, parts - calc.totalPartners * 15);
    return { ippRevenue:0, cohortRevenue:coh*500, certOverageRev:overages*s.feeCertOverage, grantRevenue:0,
      totalRevenue:calc.licenseRevenue+0+coh*500+overages*s.feeCertOverage+0 };
  }, [bothWorldsLens, state, calc]);

  const c = bothWorldsLens && lensCalc ? { ...calc, ...lensCalc } : calc;
  const chartData = [
    { name:'License', value:c.licenseRevenue, color:BLUE },
    { name:'IPP', value:c.ippRevenue, color:TEAL },
    { name:'Cohort', value:c.cohortRevenue, color:PURPLE },
    { name:'Cert Overage', value:c.certOverageRev, color:GREEN },
    { name:'Grants', value:c.grantRevenue, color:'#4ade80' },
    { name:'Fixed Costs', value:-calc.fixedTotal, color:RED },
    { name:'Variable', value:-(calc.ippCostTotal+calc.cohortCostTotal+calc.certCostTotal), color:ORANGE },
  ];
  const revSources = [
    { label:'License / Membership', value:c.licenseRevenue, color:BLUE },
    { label:'IPP Revenue', value:c.ippRevenue, color:TEAL },
    { label:'Cohort + Cert Revenue', value:c.cohortRevenue+c.certOverageRev, color:PURPLE },
    { label:'Grants', value:c.grantRevenue, color:GREEN },
  ];
  const totalRev = c.totalRevenue || 1;
  const recurring = c.licenseRevenue + c.cohortRevenue;
  const oneTime = c.ippRevenue + c.grantRevenue;
  const stabTotal = recurring + oneTime || 1;

  return (
    <div>
      {bothWorldsLens && <div style={{ background:'#eff6ff', border:'1px solid '+BLUE+'33', borderRadius:8, padding:'10px 14px', marginBottom:16, fontSize:13, fontWeight:600, color:BLUE }}>Viewing: Membership-Stable Lens (inputs unchanged)</div>}
      <Card style={{ marginBottom:16 }}>
        <div style={{ fontSize:14, fontWeight:700, color:GRAY900, marginBottom:16 }}>Revenue vs. Cost</div>
        <div style={{ width:'100%', height:300 }}>
          <ResponsiveContainer width="100%" height="100%">
            <BarChart data={chartData} margin={{ top:5,right:20,bottom:5,left:20 }}>
              <CartesianGrid strokeDasharray="3 3" stroke={GRAY200} />
              <XAxis dataKey="name" fontSize={11} />
              <YAxis tickFormatter={v=>fmt(v)} fontSize={11} />
              <Tooltip formatter={v=>fmt(v)} />
              <ReferenceLine y={0} stroke={GRAY900} />
              <Bar dataKey="value" radius={[4,4,0,0]}>
                {chartData.map((entry, idx) => <Cell key={idx} fill={entry.color} />)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </div>
      </Card>
      <Card style={{ marginBottom:16 }}>
        <div style={{ fontSize:14, fontWeight:700, color:GRAY900, marginBottom:16 }}>Revenue Source Breakdown</div>
        {revSources.map(src => {
          const p = totalRev > 0 ? (src.value / totalRev) * 100 : 0;
          return (
            <div key={src.label} style={{ marginBottom:10 }}>
              <div style={{ display:'flex', justifyContent:'space-between', fontSize:12, marginBottom:3 }}>
                <span style={{ fontWeight:600, color:GRAY700 }}>{src.label}</span>
                <span style={{ color:GRAY500 }}>{fmt(src.value)} ({p.toFixed(1)}%)</span>
              </div>
              <div style={{ background:GRAY200, borderRadius:4, height:8, overflow:'hidden' }}>
                <div style={{ width:Math.max(0,p)+'%', height:'100%', background:src.color, borderRadius:4 }} />
              </div>
            </div>
          );
        })}
      </Card>
      <Card style={{ marginBottom:16 }}>
        <div style={{ fontSize:14, fontWeight:700, color:GRAY900, marginBottom:16 }}>Revenue Stability</div>
        <div style={{ background:GRAY200, borderRadius:6, height:24, overflow:'hidden', display:'flex' }}>
          <div style={{ width:(recurring/stabTotal)*100+'%', background:BLUE, height:'100%' }} />
          <div style={{ width:(oneTime/stabTotal)*100+'%', background:TEAL, height:'100%' }} />
        </div>

// ═══ FORECAST TAB ═══
function ForecastTab({ state, calc, forecast, set }) {
  const { years, breakEvenYear } = forecast;
  const yr5 = years[4];

  // Build baseline (no scenario) for comparison
  const baselineForecast = useMemo(() => {
    const s = { ...state, forecastScenario: 'none' };
    const startPartners = s.partnerCounts.reduce((a,b) => a+b, 0);
    const ippFees = [s.feeIPP, s.ippFeeYr2, s.ippFeeYr3, s.ippFeeYr4, s.ippFeeYr5];
    const yrs = [];
    for (let yr = 0; yr < 5; yr++) {
      const feeEsc = Math.pow(1 + s.feeEscalation / 100, yr);
      const cohortFeeEsc = Math.pow(1 + s.cohortFeeEscalation / 100, yr);
      const costInf = Math.pow(1 + s.costInflation / 100, yr);
      const varCostInf = Math.pow(1 + s.variableCostInflation / 100, yr);
      const pipeGrow = Math.pow(1 + s.pipelineGrowth / 100, yr);
      const grantGrow = Math.pow(1 + s.grantGrowthRate / 100, yr);
      let partners;
      if (yr === 0) { partners = startPartners; }
      else { const prev = yrs[yr-1]; partners = Math.round(prev.partners*(s.renewalRate/100)) + Math.round(prev.newIPP*(s.pctIPPtoLicense/100)); }
      const newIPP = Math.round(s.newIPPInstructors * pipeGrow);
      const licRev = s.partnerCounts.reduce((sum, c, i) => {
        const share = startPartners > 0 ? c / startPartners : (i===0?1:0);
        return sum + Math.round(partners * share) * s.tierFees[i] * feeEsc;
      }, 0);
      const effP = partners * (s.renewalRate/100) * (1 - s.dormantRate/100);
      const coh = effP * (s.pctLicenseToActive/100) * s.cohortsPerOrg;
      const parts = coh * s.avgParticipants;
      const overages = Math.max(0, parts - partners*15);
      const grantBase = (s.funders || []).reduce((sum, f) => sum + (f.amount || 0), 0);
      const totalRev = licRev + newIPP*(ippFees[yr]||ippFees[4]) + coh*s.feeCohort*cohortFeeEsc + overages*s.feeCertOverage + grantBase*grantGrow;
      const staffInf = Math.pow(1 + s.staffRaiseRate / 100, yr);
      const calYr = s.forecastStartYear + yr;
      const accredC = s.costAccreditation*costInf + (calYr===s.reaccredYear?s.reaccredCost:0);
      const fixedT = s.costStaff*staffInf + s.costLMS*costInf + accredC + s.costSystems*costInf;
      const totalCost = fixedT + newIPP*s.costPerIPP*varCostInf + coh*s.costPerCohort*varCostInf + parts*s.costPerCert*varCostInf;
      yrs.push({ year: yr+1, label: 'Year '+(yr+1), partners, newIPP, totalRevenue: totalRev, totalCost, netMargin: totalRev - totalCost });
    }
    return yrs;
  }, [state]);

  // Chart data for revenue stacked area
  const revenueChartData = years.map(y => ({
    name: y.label,
    License: Math.round(y.licenseRevenue),
    IPP: Math.round(y.ippRevenue),
    Cohort: Math.round(y.cohortRevenue),
    Certs: Math.round(y.certRevenue),
    Grants: Math.round(y.grantRevenue),
  }));

  // Chart data for margin comparison
  const marginChartData = years.map((y, i) => {
    const entry = { name: y.label, Forecast: Math.round(y.netMargin) };
    if (state.forecastScenario !== 'none') {
      entry['Baseline'] = Math.round(baselineForecast[i].netMargin);
    }
    return entry;
  });

  // Chart data for cumulative
  const cumChartData = years.map(y => ({
    name: y.label,
    'Cumulative Revenue': Math.round(y.cumRevenue),
    'Cumulative Cost': Math.round(y.cumCost),
    'Cumulative Margin': Math.round(y.cumMargin),
  }));

  const thS = { textAlign:'right', padding:'8px 10px', fontSize:12, fontWeight:700, color:GRAY700, borderBottom:'2px solid '+GRAY200 };
  const tdS = { textAlign:'right', padding:'6px 10px', fontSize:12, borderBottom:'1px solid '+GRAY100 };

  return (
    <div>
      <div style={{ fontSize:13, color:GRAY500, marginBottom:16 }}>
        5-year projection based on current inputs with growth, escalation, and inflation assumptions.
      </div>

      {/* Forecast Inputs */}
      <Card style={{ marginBottom:16 }}>
        <SectionDivider label="Growth & Escalation Assumptions" />
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'0 24px' }}>
          <SliderField label="License fee escalation" value={state.feeEscalation} min={0} max={15} step={0.5} onChange={v=>set('feeEscalation',v)} unit="%/yr" note="Applied to all tier fees annually" />
          <SliderField label="Cohort fee escalation" value={state.cohortFeeEscalation} min={0} max={15} step={0.5} onChange={v=>set('cohortFeeEscalation',v)} unit="%/yr" />
          <SliderField label="Staff raise rate" value={state.staffRaiseRate} min={0} max={15} step={0.5} onChange={v=>set('staffRaiseRate',v)} unit="%/yr" note="Annual staff cost increase (raises, benefits)" />
          <SliderField label="Other fixed cost inflation" value={state.costInflation} min={0} max={15} step={0.5} onChange={v=>set('costInflation',v)} unit="%/yr" note="LMS, systems, overhead (not staff or ANSI)" />
          <SliderField label="Variable cost inflation" value={state.variableCostInflation} min={0} max={15} step={0.5} onChange={v=>set('variableCostInflation',v)} unit="%/yr" note="IPP delivery, cohort processing, certs" />
          <SliderField label="Pipeline growth (new IPP/yr)" value={state.pipelineGrowth} min={-20} max={50} step={1} onChange={v=>set('pipelineGrowth',v)} unit="%/yr" note="Annual growth in new IPP instructors" />
          <SliderField label="Grant revenue growth" value={state.grantGrowthRate} min={-50} max={100} step={5} onChange={v=>set('grantGrowthRate',v)} unit="%/yr" />
        </div>
        <SectionDivider label="Reaccreditation / ANSI" />
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:16, marginBottom:8 }}>
          <div>
            <label style={{ fontSize:13, fontWeight:600, color:GRAY700, display:'block', marginBottom:4 }}>Forecast start year</label>
            <input type="number" value={state.forecastStartYear} onChange={e=>set('forecastStartYear',Number(e.target.value))}
              style={{ width:'100%', padding:'6px 10px', border:'1px solid '+GRAY200, borderRadius:6, fontSize:13 }} />
          </div>
          <div>
            <label style={{ fontSize:13, fontWeight:600, color:GRAY700, display:'block', marginBottom:4 }}>Reaccreditation year</label>
            <input type="number" value={state.reaccredYear} onChange={e=>set('reaccredYear',Number(e.target.value))}
              style={{ width:'100%', padding:'6px 10px', border:'1px solid '+GRAY200, borderRadius:6, fontSize:13 }} />
          </div>
          <div>
            <label style={{ fontSize:13, fontWeight:600, color:GRAY700, display:'block', marginBottom:4 }}>Reaccreditation cost</label>
            <input type="number" value={state.reaccredCost} onChange={e=>set('reaccredCost',Number(e.target.value))}
              style={{ width:'100%', padding:'6px 10px', border:'1px solid '+GRAY200, borderRadius:6, fontSize:13 }} />
          </div>
        </div>
        {state.reaccredYear >= state.forecastStartYear && state.reaccredYear < state.forecastStartYear + 5 && (
          <div style={{ fontSize:12, color:AMBER, fontWeight:600, marginBottom:8 }}>
            {'\u26A0'} Reaccreditation ({fmt(state.reaccredCost)}) hits in {state.reaccredYear} (Year {state.reaccredYear - state.forecastStartYear + 1} of forecast)
          </div>
        )}
        <SectionDivider label="IPP Fee Schedule (by year)" />
        <div style={{ display:'grid', gridTemplateColumns:'repeat(5,1fr)', gap:8 }}>
          <div><div style={{ fontSize:11, color:GRAY500, marginBottom:4 }}>Year 1</div><div style={{ fontSize:14, fontWeight:700, color:TEAL }}>{fmt(state.feeIPP)}</div><div style={{ fontSize:10, color:GRAY400 }}>Set in Costs tab</div></div>
          {[2,3,4,5].map(yr => (
            <div key={yr}>
              <div style={{ fontSize:11, color:GRAY500, marginBottom:4 }}>Year {yr}</div>
              <input type="number" value={state['ippFeeYr'+yr]} onChange={e=>set('ippFeeYr'+yr, Number(e.target.value))}
                style={{ width:'100%', padding:'4px 8px', border:'1px solid '+GRAY200, borderRadius:6, fontSize:13, textAlign:'right' }} />
            </div>
          ))}
        </div>
        <SectionDivider label="Scenario Overlay" />
        <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
          {[{k:'none',l:'No Scenario'},{k:'pilot',l:'Pilot'},{k:'consortium',l:'Consortium'},{k:'sponsored',l:'Sponsored'}].map(o => (
            <button key={o.k} onClick={()=>set('forecastScenario',o.k)} style={{
              padding:'8px 14px', fontSize:12, fontWeight:600, borderRadius:6, border:'1px solid '+GRAY200,
              background:state.forecastScenario===o.k?PURPLE:'white', color:state.forecastScenario===o.k?'white':GRAY700,
              cursor:'pointer', fontFamily:"'Inter',sans-serif"
            }}>{o.l}</button>
          ))}
        </div>
        {state.forecastScenario !== 'none' && (
          <div style={{ fontSize:11, color:PURPLE, fontStyle:'italic', marginTop:6 }}>
            Scenario "{state.forecastScenario}" adjustments applied to forecast. Baseline shown as comparison line.
          </div>
        )}
      </Card>

      {/* Summary KPIs */}
      <div style={{ display:'flex', gap:12, marginBottom:16, flexWrap:'wrap' }}>
        <StatCard label="5-Year Total Revenue" value={fmt(yr5.cumRevenue)} color={BLUE} sub={fmt(yr5.totalRevenue)+' in Year 5'} />
        <StatCard label="5-Year Total Cost" value={fmt(yr5.cumCost)} color={RED} sub={fmt(yr5.totalCost)+' in Year 5'} />
        <StatCard label="5-Year Net Margin" value={fmt(yr5.cumMargin)} color={yr5.cumMargin>=0?GREEN:RED} highlight={true} sub={pct(yr5.cumRevenue>0?yr5.cumMargin/yr5.cumRevenue:0)+' overall margin'} />
        <StatCard label="Year 5 Partners" value={yr5.partners} color={TEAL} sub={'from '+years[0].partners+' in Year 1'} />
        <StatCard label="Cumulative Break-Even" value={breakEvenYear ? 'Year '+breakEvenYear : 'Not reached'} color={breakEvenYear?GREEN:RED} sub={breakEvenYear?'Cumulative margin turns positive':'5-year cumulative is negative'} />
      </div>

      {/* Revenue Stacked Bar */}
      <Card style={{ marginBottom:16 }}>
        <div style={{ fontSize:14, fontWeight:700, color:GRAY900, marginBottom:16 }}>Revenue by Source (5-Year)</div>
        <div style={{ width:'100%', height:300 }}>
          <ResponsiveContainer width="100%" height="100%">
            <BarChart data={revenueChartData} margin={{ top:5,right:20,bottom:5,left:20 }}>
              <CartesianGrid strokeDasharray="3 3" stroke={GRAY200} />
              <XAxis dataKey="name" fontSize={11} />
              <YAxis tickFormatter={v=>fmt(v)} fontSize={11} />
              <Tooltip formatter={v=>fmt(v)} />
              <Legend />
              <Bar dataKey="License" stackId="a" fill={BLUE} />
              <Bar dataKey="IPP" stackId="a" fill={TEAL} />
              <Bar dataKey="Cohort" stackId="a" fill={PURPLE} />
              <Bar dataKey="Certs" stackId="a" fill={GREEN} />
              <Bar dataKey="Grants" stackId="a" fill="#4ade80" />
            </BarChart>
          </ResponsiveContainer>
        </div>
      </Card>

      {/* Net Margin Line */}
      <Card style={{ marginBottom:16 }}>
        <div style={{ fontSize:14, fontWeight:700, color:GRAY900, marginBottom:16 }}>
          Net Margin Trajectory
          {state.forecastScenario !== 'none' && <span style={{ fontSize:12, fontWeight:400, color:GRAY500 }}> {'\u2014'} vs. baseline</span>}
        </div>
        <div style={{ width:'100%', height:280 }}>
          <ResponsiveContainer width="100%" height="100%">
            <LineChart data={marginChartData} margin={{ top:5,right:20,bottom:5,left:20 }}>
              <CartesianGrid strokeDasharray="3 3" stroke={GRAY200} />
              <XAxis dataKey="name" fontSize={11} />
              <YAxis tickFormatter={v=>fmt(v)} fontSize={11} />
              <Tooltip formatter={v=>fmt(v)} />
              <Legend />
              <ReferenceLine y={0} stroke={RED} strokeDasharray="4 4" />
              <Line type="monotone" dataKey="Forecast" stroke={PURPLE} strokeWidth={2.5} dot={{ r:4 }} />
              {state.forecastScenario !== 'none' && <Line type="monotone" dataKey="Baseline" stroke={BLUE} strokeWidth={2} strokeDasharray="6 3" dot={{ r:3 }} />}
            </LineChart>
          </ResponsiveContainer>
        </div>
      </Card>

      {/* Cumulative P&L */}
      <Card style={{ marginBottom:16 }}>
        <div style={{ fontSize:14, fontWeight:700, color:GRAY900, marginBottom:16 }}>Cumulative P&L</div>
        <div style={{ width:'100%', height:280 }}>
          <ResponsiveContainer width="100%" height="100%">
            <LineChart data={cumChartData} margin={{ top:5,right:20,bottom:5,left:20 }}>
              <CartesianGrid strokeDasharray="3 3" stroke={GRAY200} />
              <XAxis dataKey="name" fontSize={11} />
              <YAxis tickFormatter={v=>fmt(v)} fontSize={11} />
              <Tooltip formatter={v=>fmt(v)} />
              <Legend />
              <ReferenceLine y={0} stroke={GRAY900} strokeDasharray="2 2" />
              <Line type="monotone" dataKey="Cumulative Revenue" stroke={BLUE} strokeWidth={2} dot={{ r:3 }} />
              <Line type="monotone" dataKey="Cumulative Cost" stroke={RED} strokeWidth={2} dot={{ r:3 }} />
              <Line type="monotone" dataKey="Cumulative Margin" stroke={GREEN} strokeWidth={2.5} dot={{ r:4 }} />
            </LineChart>
          </ResponsiveContainer>
        </div>
      </Card>

      {/* Detailed Table */}
      <Card style={{ marginBottom:16 }}>
        <div style={{ fontSize:14, fontWeight:700, color:GRAY900, marginBottom:16 }}>Year-by-Year Detail</div>
        <div style={{ overflowX:'auto' }}>
          <table style={{ width:'100%', borderCollapse:'collapse', minWidth:700 }}>
            <thead>
              <tr style={{ background:GRAY50 }}>
                <th style={{ ...thS, textAlign:'left' }}>Metric</th>
                {years.map(y => <th key={y.year} style={thS}>{y.label}</th>)}
                <th style={{ ...thS, color:BLUE }}>5-Yr Total</th>
              </tr>
            </thead>
            <tbody>
              <tr><td style={{ ...tdS, textAlign:'left', fontWeight:600 }}>Partners</td>
                {years.map(y => <td key={y.year} style={tdS}>{y.partners}</td>)}
                <td style={tdS}>{'\u2014'}</td></tr>
              <tr><td style={{ ...tdS, textAlign:'left', fontWeight:600 }}>New IPP Instructors</td>
                {years.map(y => <td key={y.year} style={tdS}>{y.newIPP}</td>)}
                <td style={tdS}>{years.reduce((s,y)=>s+y.newIPP,0)}</td></tr>
              <tr style={{ background:'#f0f9ff' }}><td style={{ ...tdS, textAlign:'left', fontWeight:600, color:BLUE }}>License Revenue</td>
                {years.map(y => <td key={y.year} style={tdS}>{fmt(y.licenseRevenue)}</td>)}
                <td style={{ ...tdS, fontWeight:700 }}>{fmt(years.reduce((s,y)=>s+y.licenseRevenue,0))}</td></tr>
              <tr><td style={{ ...tdS, textAlign:'left', fontWeight:600 }}>IPP Revenue</td>
                {years.map(y => <td key={y.year} style={tdS}>{fmt(y.ippRevenue)}</td>)}
                <td style={{ ...tdS, fontWeight:700 }}>{fmt(years.reduce((s,y)=>s+y.ippRevenue,0))}</td></tr>
              <tr><td style={{ ...tdS, textAlign:'left', fontWeight:600 }}>Cohort Revenue</td>
                {years.map(y => <td key={y.year} style={tdS}>{fmt(y.cohortRevenue)}</td>)}
                <td style={{ ...tdS, fontWeight:700 }}>{fmt(years.reduce((s,y)=>s+y.cohortRevenue,0))}</td></tr>
              <tr><td style={{ ...tdS, textAlign:'left', fontWeight:600 }}>Cert + Grant Revenue</td>
                {years.map(y => <td key={y.year} style={tdS}>{fmt(y.certRevenue+y.grantRevenue)}</td>)}
                <td style={{ ...tdS, fontWeight:700 }}>{fmt(years.reduce((s,y)=>s+y.certRevenue+y.grantRevenue,0))}</td></tr>
              <tr style={{ background:'#f0f9ff' }}><td style={{ ...tdS, textAlign:'left', fontWeight:700, color:BLUE }}>Total Revenue</td>
                {years.map(y => <td key={y.year} style={{ ...tdS, fontWeight:700, color:BLUE }}>{fmt(y.totalRevenue)}</td>)}
                <td style={{ ...tdS, fontWeight:700, color:BLUE }}>{fmt(yr5.cumRevenue)}</td></tr>
              <tr><td style={{ ...tdS, textAlign:'left', fontWeight:600 }}>Fixed Costs</td>
                {years.map(y => <td key={y.year} style={tdS}>{fmt(y.fixedCost)}</td>)}
                <td style={{ ...tdS, fontWeight:700 }}>{fmt(years.reduce((s,y)=>s+y.fixedCost,0))}</td></tr>
              {years.some(y=>y.reaccredSpike>0) && <tr style={{ background:'#fffbeb' }}><td style={{ ...tdS, textAlign:'left', fontWeight:600, color:AMBER }}>{'\u26A0'} Reaccreditation (included above)</td>
                {years.map(y => <td key={y.year} style={{ ...tdS, color:y.reaccredSpike>0?AMBER:GRAY400 }}>{y.reaccredSpike>0?fmt(y.reaccredSpike):'\u2014'}</td>)}
                <td style={{ ...tdS, fontWeight:700, color:AMBER }}>{fmt(years.reduce((s,y)=>s+y.reaccredSpike,0))}</td></tr>}
              <tr><td style={{ ...tdS, textAlign:'left', fontWeight:600 }}>Variable Costs</td>
                {years.map(y => <td key={y.year} style={tdS}>{fmt(y.variableCost)}</td>)}
                <td style={{ ...tdS, fontWeight:700 }}>{fmt(years.reduce((s,y)=>s+y.variableCost,0))}</td></tr>
              <tr style={{ background:'#fef2f2' }}><td style={{ ...tdS, textAlign:'left', fontWeight:700, color:RED }}>Total Cost</td>
                {years.map(y => <td key={y.year} style={{ ...tdS, fontWeight:700, color:RED }}>{fmt(y.totalCost)}</td>)}
                <td style={{ ...tdS, fontWeight:700, color:RED }}>{fmt(yr5.cumCost)}</td></tr>
              <tr style={{ background:yr5.cumMargin>=0?'#f0fdf4':'#fef2f2' }}>
                <td style={{ ...tdS, textAlign:'left', fontWeight:700, fontSize:13, color:yr5.cumMargin>=0?GREEN:RED }}>Net Margin</td>
                {years.map(y => <td key={y.year} style={{ ...tdS, fontWeight:700, fontSize:13, color:y.netMargin>=0?GREEN:RED }}>{fmt(y.netMargin)}</td>)}
                <td style={{ ...tdS, fontWeight:700, fontSize:13, color:yr5.cumMargin>=0?GREEN:RED }}>{fmt(yr5.cumMargin)}</td></tr>
              <tr><td style={{ ...tdS, textAlign:'left', fontWeight:600 }}>Margin %</td>
                {years.map(y => <td key={y.year} style={{ ...tdS, color:y.marginPct>=0?GREEN:RED }}>{pct(y.marginPct)}</td>)}
                <td style={{ ...tdS, color:yr5.cumRevenue>0&&yr5.cumMargin/yr5.cumRevenue>=0?GREEN:RED }}>{pct(yr5.cumRevenue>0?yr5.cumMargin/yr5.cumRevenue:0)}</td></tr>
              <tr style={{ borderTop:'2px solid '+GRAY200 }}><td style={{ ...tdS, textAlign:'left', fontWeight:700, color:GRAY900 }}>Cumulative Margin</td>
                {years.map(y => <td key={y.year} style={{ ...tdS, fontWeight:700, color:y.cumMargin>=0?GREEN:RED }}>{fmt(y.cumMargin)}</td>)}
                <td style={tdS}>{'\u2014'}</td></tr>
            </tbody>
          </table>
        </div>
      </Card>

      {/* Partner Growth Chart */}
      <Card>
        <div style={{ fontSize:14, fontWeight:700, color:GRAY900, marginBottom:16 }}>Partner Base Growth</div>
        <div style={{ width:'100%', height:220 }}>
          <ResponsiveContainer width="100%" height="100%">
            <BarChart data={years.map(y=>({ name:y.label, Partners:y.partners, 'New IPP':y.newIPP }))} margin={{ top:5,right:20,bottom:5,left:20 }}>
              <CartesianGrid strokeDasharray="3 3" stroke={GRAY200} />
              <XAxis dataKey="name" fontSize={11} />
              <YAxis fontSize={11} />
              <Tooltip />
              <Legend />
              <Bar dataKey="Partners" fill={BLUE} radius={[4,4,0,0]} />
              <Bar dataKey="New IPP" fill={TEAL} radius={[4,4,0,0]} />
            </BarChart>
          </ResponsiveContainer>
        </div>
        <div style={{ fontSize:11, color:GRAY500, fontStyle:'italic', marginTop:8 }}>
          Partner base = (prior year {'\u00D7'} renewal rate) + new partners from pipeline. New IPP grows at {state.pipelineGrowth}%/yr.
        </div>
      </Card>
    </div>
  );
}

// ═══ RENDER ═══
try {
  ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
} catch(e) {
  document.getElementById('root').innerHTML = '<pre style="color:red;padding:40px">'+e.message+'\n'+e.stack+'</pre>';
}
</script>
</body>
</html>
